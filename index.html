<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>PDF Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <iframe
    src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://sagarbiswas-multihat.github.io/BashScript-Notebooks/BashScript-Notebook.pdf">
  </iframe>

</body>

</html>
